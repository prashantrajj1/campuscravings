<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusCravings</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>


    <div id="splash-screen" class="splash-screen">
        <div class="splash-top">
            <div class="splash-logo">
                <i class="fa-solid fa-utensils"></i> Campus<span>Cravings</span>
            </div>
        </div>
        <div class="splash-bottom">
            <h1 class="splash-title">Hungry?<br>Get It Fast</h1>
            <p class="splash-subtitle">Fresh, fast, and tailored to your taste!</p>
            <a href="login.html" class="splash-btn" onclick="hideSplash()">
                <div class="icon-circle"><i class="fa-solid fa-cart-arrow-down"></i></div>
                <span>Login</span>
                <div class="arrows">
                </div>
            </a>
        </div>
    </div>


    <div class="app-container">


        <header class="app-header">

            <div class="logo-desktop">
                <i class="fa-solid fa-utensils"></i> Campus<span>Cravings</span>
            </div>

            <button class="notification-btn" title="Notifications"><i class="fa-regular fa-bell"></i><span
                    class="dot"></span></button>
        </header>

        <script src="js/script.js"></script>
</body>

</html>

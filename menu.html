<!DOCTYPE html>
<html>

<head>
    <title>Menu</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1 style="text-align:center">Food Menu</h1>

    <section class="restaurants">

        <div class="card">
            <h3>Cheese Burger</h3>
            <p>₹150</p>
            <button onclick="addToCart('Cheese Burger',150)">Add</button>
        </div>

        <div class="card">
            <h3>Veg Pizza</h3>
            <p>₹220</p>
            <button onclick="addToCart('Veg Pizza',220)">Add</button>
        </div>

        <div class="card">
            <h3>French Fries</h3>
            <p>₹90</p>
            <button onclick="addToCart('Fries',90)">Add</button>
        </div>

    </section>

    <script src="js/script.js"></script>

</body>

</html>

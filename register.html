<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CampusCravings</title>
    <!-- Local CSS only -->
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="logo">
        <i class="fa-solid fa-utensils"></i> Campus<span>Cravings</span>
    </div>

    <div class="login-box">
        <div class="form">
            <h2 id="errlogs"></h2>
            <form id="registerForm">

                <label for="email">Email: </label>
                <input type="email" id="email" name="email" placeholder="your college mail">
                <label for="course"> Course </label>
                <input type="text" id="course" name="course" placeholder="course">
                <label for="rollno">University Roll No.</label>
                <input type="text" id="rollno" name="rollno" placeholder="rollno">
                <label for="password">Password: </label>
                <input type="password" id="password" name="password" placeholder="password">
                <label for="confirm-password">Confirm Password: </label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="password">

                <button type="submit" class="btn">Register</button><br><br>
                <p>Already have an account? <a href="login.html">Login</a></p>

            </form>

        </div>
    </div>

    <script>
        //the email should be of student from XIM 
        const emailRegex = /^[a-zA-Z0-9._%+-]+@stu\.xim\.edu\.in$/;
        const form = document.querySelector('form');
        const errLogs = document.getElementById('errlogs');

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');

        const validate = () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;

            if (email !== "" && !emailRegex.test(email)) {
                errLogs.textContent = "Please use your @stu.xim.edu.in email";
                errLogs.style.color = "red";
                errLogs.style.fontSize = "14px";
                return false;
            } else if (confirmPassword !== "" && password !== confirmPassword) {
                errLogs.textContent = "Passwords do not match";
                errLogs.style.color = "red";
                errLogs.style.fontSize = "14px";
                return false;
            } else {
                errLogs.textContent = "";
                return true;
            }
        };

        emailInput.addEventListener('input', validate);
        passwordInput.addEventListener('input', validate);
        confirmInput.addEventListener('input', validate);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validate() || !emailRegex.test(emailInput.value)) {
                if (!emailRegex.test(emailInput.value)) {
                    errLogs.textContent = "Please use your @stu.xim.edu.in email";
                    errLogs.style.color = "red";
                }
                return;
            }

            const email = emailInput.value;
            const course = document.getElementById('course').value;
            const rollno = document.getElementById('rollno').value;
            const password = passwordInput.value;

            try {
                const response = await fetch('php/register.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `email=${encodeURIComponent(email)}&course=${encodeURIComponent(course)}&rollno=${encodeURIComponent(rollno)}&password=${encodeURIComponent(password)}`
                });

                const data = await response.json();

                if (data.status === 'success') {
                    errLogs.textContent = "Registration successful! Redirecting to login...";
                    errLogs.style.color = "green";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errLogs.textContent = data.message;
                    errLogs.style.color = "red";
                }
            } catch (err) {
                errLogs.textContent = "An error occurred. Please try again later.";
                errLogs.style.color = "red";
            }
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Campus Cravings - Checkout</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
</head>

<body>

    <div class="header-top">
        <a href="index.html" class="logo">
            <span class="campus">Campus</span><span class="cravings">Cravings</span>
        </a>
    </div>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="cart.html">Cart</a>
        <a href="login.html">Login</a>
    </div>

    <div class="container" style="max-width: 600px;">
        <h2>Complete Your Order</h2>
        <p style="margin-bottom: 25px; color: #7BB21B;">Almost there! Please provide your details.</p>

        <!-- HTML Forms (Module IV) -->
        <form action="php/order_process.php" method="POST">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="customer_name" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="customer_email" required placeholder="Enter your email">
            </div>

            <!-- Hidden inputs to pass data from JS to PHP -->
            <input type="hidden" name="food_details" id="food-details-input">
            <input type="hidden" name="total_amount" id="total-amount-input">

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;"
                onclick="sessionStorage.removeItem('cravings_cart');">
                Confirm Order
            </button>

        </form>
    </div>

    <div class="footer">
        &copy; 2026 Campus Cravings. All Rights Reserved.
    </div>

</body>

</html>
